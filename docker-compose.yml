services:
  base_datos_bunker:
    image: mariadb:lts
    container_name: db_wordpress
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: wordpress_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - ./datos_mysql:/var/lib/mysql
    # ATENCIÓN: No hay apartado "ports". Esta máquina es invisible desde el exterior.

  servidor_web:
    image: wordpress:latest
    container_name: web_wordpress
    ports:
      - "8086:80" # Solo exponemos la web al exterior
    environment:
      WORDPRESS_DB_HOST: base_datos_bunker # ¡El truco de la telepatía!
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASS}
      WORDPRESS_DB_NAME: wordpress_db
    volumes:
      - ./datos_wordpress:/var/www/html
    depends_on:
      - base_datos_bunker